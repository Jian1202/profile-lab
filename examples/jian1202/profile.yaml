page:
  title: 渡的小窝
  subtitle: AI / Frontend / Transformer
  description: 个人 AI 实验室主页，包含当前方向、成长路径、GitHub 雷达、知识树和代表项目。

theme:
  preset: light-blue

sections:
  - id: header
    type: header
    enabled: true
    variant: default
    data:
      title: 渡的小窝
      greeting: 哈喽，这里是渡的小窝哦
      subtitle: AI / Frontend / Transformer

  - id: mission
    type: mission
    enabled: true
    variant: cards
    data:
      title: 最近在做
      eyebrow: CURRENT MISSION
      tracks:
        - name: AI
          items: [LLM, Agent, Transformer]
          color: blue
        - name: Engineering
          items: [Frontend, Tooling]
          color: green

  - id: timeline
    type: timeline
    enabled: true
    variant: horizontal
    data:
      title: 成长路径
      eyebrow: DEVELOPER JOURNEY
      entries:
        - year: "2025"
          focus: Frontend
          color: green
        - year: "2026"
          focus: AI + LLM
          color: blue
        - year: Future
          focus: Agent / Robotics
          color: gold

  - id: radar
    type: radar
    enabled: true
    variant: default
    data:
      title: 小窝雷达
      eyebrow: STATIC SNAPSHOT
      stats:
        - label: Stars
          value: 20
          color: gold
        - label: Repositories
          value: 12
          color: green
        - label: Commits
          value: 82
          color: blue
        - label: Contributions
          value: 158
          color: blue
      languages:
        - name: Python
          percent: 67
        - name: JavaScript
          percent: 19
        - name: TypeScript
          percent: 14

  - id: skills
    type: skills
    enabled: true
    variant: tree
    data:
      title: 知识树
      eyebrow: KNOWLEDGE TREE
      trees:
        - name: AI
          items: [Machine Learning, Deep Learning, Transformer, Agent]
          color: blue
        - name: Engineering
          items: [Frontend, Git, System]
          color: green

  - id: projects
    type: projects
    enabled: true
    variant: drawer
    data:
      title: 项目抽屉
      eyebrow: PROJECT NOTES
      entries:
        - name: my-agent
          description: 从零写 LLM Agent 的小实践
          tags: [LLM, Agent]
          color: blue
        - name: transformer-explainer-cn
          description: Transformer 可视化解释器汉化
          tags: [Transformer, Education]
          color: gold
        - name: grape-robot
          description: 机器人视觉与采摘方向练习
          tags: [Vision, Robotics]
          color: green

  - id: footer
    type: footer
    enabled: true
    variant: default
    data:
      handle: Jian1202
      slogan: Curiosity, the power to change.
